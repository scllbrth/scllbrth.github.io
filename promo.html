<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/nav.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <title>好消息 goodtidings crochet</title>
  </head>

  <body data-page-type="promo">
    <div class="container">
      <header>
        <nav>
          <h3><a href="./index.html">好消息 goodtidings</a></h3>
          <ul class="nav-menu">
            <li><a href="#">春季特價</a></li>
            <li><a href="#">免費織圖</a></li>
            <li><a href="#">娃娃織圖</a></li>
            <li><a href="#">包袋及服飾織圖</a></li>
            <li><a href="#">登入/註冊</a></li>
            <li>
              <a href="javascript:;"
                ><i class="bi bi-cart4" id="cart" aria-label="cart"></i
              ></a>
            </li>
            <!-- change later -->
            <!-- prevent default: use javascript:; (more pro, wont show on address bar) or #:; -->
          </ul>
        </nav>
      </header>

      <main class="main-product">
        <section class="side-menu open">
          <form id="filter-form">
            <div class="filter-container">
              <div class="filter-header">
                <span>鈎針尺寸</span>
                <span class="filter-icon">+</span>
              </div>
              <div class="filter-content">
                <div class="content-inner">
                  <label for="2.0mm"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="2.0mm"
                      name="hook"
                      value="2.0mm"
                    />2.0mm</label
                  >
                  <label for="3.0mm"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="3.0mm"
                      name="hook"
                      value="3.0mm"
                    />3.0mm</label
                  >
                  <label for="4.0mm"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="4.0mm"
                      name="hook"
                      value="4.0mm"
                    />4.0mm</label
                  >
                </div>
              </div>
            </div>
            <div class="filter-container">
              <div class="filter-header">
                <span>毛線種類</span>
                <span class="filter-icon">+</span>
              </div>
              <div class="filter-content">
                <div class="content-inner">
                  <label for="cotton"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="cotton"
                      name="yarn"
                      value="cotton"
                    />棉</label
                  >
                  <label for="wool"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="wool"
                      name="yarn"
                      value="wool"
                    />羊毛</label
                  >
                  <label for="acrylic"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="acrylic"
                      name="yarn"
                      value="acrylic"
                    />壓克力</label
                  >
                </div>
              </div>
            </div>
            <div class="filter-container">
              <div class="filter-header">
                <span>鈎織技術</span>
                <span class="filter-icon">+</span>
              </div>
              <div class="filter-content">
                <div class="content-inner">
                  <label for="chain"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="chain"
                      name="technique"
                      value="chain"
                    />鎖針</label
                  >
                  <label for="single"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="single"
                      name="technique"
                      value="single"
                    />短針</label
                  >
                  <label for="magic"
                    ><input
                      type="checkbox"
                      class="filter-check"
                      id="magic"
                      name="technique"
                      value="magic"
                    />環狀起針</label
                  >
                </div>
              </div>
            </div>
          </form>
        </section>

        <section class="products">
          <div class="products-row">
            <div class="products-row-info">
              <h2 class="products-row-title">春季特價</h2>
              <button class="filter-toggle">濾鏡</button>
            </div>
            <div class="products-row-items"></div>
          </div>

          <template id="template">
            <div class="products-row-item">
              <div class="products-row-item-top">
                <a href="javascript:;"><img src="" alt="" /></a>
                <div class="products-row-item-texts">
                  <span class="item-name"></span>
                  <span class="item-price"></span>
                </div>
              </div>
              <button class="buy" data-id="">加入購物車</button>
            </div>
          </template>
        </section>

        <div id="buy-modal"></div>

        <!-- <section class="cart closed">  style="display: none;" 
                <h2 class="cart-title">您的購物車</h2>

                <div class="cart-items"></div>
                <div class="cart-footer">
                    <p>總計: <span id="cart-total">NT$0</span></p>
                    <button class="checkout-btn">結帳</button>
                </div>                

            </section> -->
      </main>

      <footer></footer>

      <script type="module" src="./js/main.js"></script>
      <script type="module" src="./js/product.js"></script>
    </div>
  </body>
</html>
